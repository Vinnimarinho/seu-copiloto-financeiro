name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Toda segunda-feira às 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  npm-audit:
    name: npm audit (high+critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      - name: Run npm audit (production deps only)
        # Falha apenas em vulnerabilidades high/critical em deps de PRODUÇÃO.
        # Vulnerabilidades em devDependencies (vite, vitest, esbuild, etc.)
        # não vão para o bundle final e não bloqueiam o release.
        # Regra alinhada com RELEASE_CHECK.md.
        run: npm audit --omit=dev --audit-level=high
