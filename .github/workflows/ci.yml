name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela runs antigas da mesma ref para reduzir spam
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build

      - name: Test
        # package.json não tem script "test" mapeado — rodamos vitest direto.
        # Alinhado com RELEASE_CHECK.md.
        run: npx vitest run
