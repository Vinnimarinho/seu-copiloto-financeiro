# Webhook do Stripe: NÃO valida JWT (chamado pelo Stripe, não pelo cliente).
# A autenticidade é validada via assinatura HMAC com STRIPE_WEBHOOK_SECRET.
[functions.stripe-webhook]
verify_jwt = false

# Formulário de contato público — não exige autenticação
[functions.send-contact-email]
verify_jwt = false

# Pré-checagem de CPF antes do signup — chamado por visitantes não autenticados
[functions.signup-precheck]
verify_jwt = false

# Detecção de geo/idioma — público (sem JWT) para landing e onboarding
[functions.geo-detect]
verify_jwt = false
